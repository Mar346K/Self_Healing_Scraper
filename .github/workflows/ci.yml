name: CI/CD Pipeline
on: [push, pull_request]

# Add this global environment variable to silence the Node 20 warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Security Audit (Bandit)
        run: bandit -r src/
      - name: Linting (Ruff)
        run: ruff check src/
      - name: Type Checking (Mypy)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          mypy --package src --ignore-missing-imports
      - name: Unit Tests
        env:
          GEMINI_API_KEY: "dummy_test_key_for_ci"
        run: pytest tests/unit/
